<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N1-N5 Study Hub</title>
    <style>
        body { font-family: sans-serif; background-color: #f7f9fc; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        
        .control-panel { 
            background: #ffffff; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative; 
            z-index: 10;
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            align-items: center; 
            flex-wrap: wrap;
        }

        .bottom-nav {
            margin: 40px 0 20px 0;
            padding: 25px;
            background: #ffffff;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        select, input[type="number"] { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; text-align: center; }
        
        button { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .btn-load { background: #2ecc71; color: white; padding: 10px 25px; font-size: 16px; }
        .btn-nav { background: #3498db; color: white; }
        .btn-load:hover { background: #27ae60; }
        .btn-nav:hover { background: #2980b9; }

        header { text-align: center; padding: 20px; background: #2c3e50; color: white; border-radius: 10px; margin-bottom: 20px; }
        section { background: white; padding: 20px; margin-bottom: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { border-left: 5px solid #e74c3c; padding-left: 15px; color: #2c3e50; margin-top: 0; }
        
        .item-container { margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; width: 100%; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .sec-item { margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px; width: 90%; }
        .chokkai-header { width: 100%; text-align: left; margin-bottom: 10px; color: #2c3e50; font-size: 18px; font-weight: bold; border-bottom: 2px solid #3498db; padding-bottom: 5px; }

        img { max-width: 100%; height: auto; border-radius: 5px; margin-bottom: 15px; border: 1px solid #f0f0f0; }
        audio { width: 100%; max-width: 500px; margin-bottom: 10px; }
        
        .answer-box { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 20px; border-radius: 10px; text-align: center; margin-top: 10px; width: 100%; max-width: 500px;}
        .hidden { display: none !important; }

        #backToTop {
            display: none; 
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 99;
            border: none;
            background-color: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 50%; 
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <select id="levelInput" onchange="loadContent()">
            <option value="1">N1</option>
            <option value="2">N2</option>
            <option value="3" selected>N3</option>
            <option value="4">N4</option>
            <option value="5">N5</option>
        </select>
        <div style="display: flex; align-items: center; gap: 5px;">
            <button class="btn-nav" onclick="changeClass(-1)">◀ Prev</button>
            <input type="number" id="classInput" value="1" min="1" style="width: 50px;" onchange="loadContent()">
            <button class="btn-nav" onclick="changeClass(1)">Next ▶</button>
        </div>
        <button class="btn-load" onclick="loadContent()">Refresh</button>
    </div>

    <header><h1 id="pageTitle">Loading...</h1></header>

    <section>
        <h2>Sentences (例文)</h2>
        <div id="sentence-list"></div>
    </section>

    <section>
        <h2>Grammar (文法)</h2>
        <div id="grammar-list"></div>
    </section>

    <section>
        <h2>Dokkai (読解)</h2>
        <div id="dokkai-list"></div>
    </section>

    <section>
        <h2>Chokkai (聴解)</h2>
        <div id="chokkai-list"></div>
    </section>

    <section id="vocab-section">
        <h2>Vocabulary (語彙)</h2>
        <div id="vocabulary-list"></div>
    </section>

    <div class="bottom-nav">
        <button class="btn-nav" onclick="changeClass(-1)">◀ Previous Class</button>
        <button class="btn-nav" onclick="changeClass(1)">Next Class ▶</button>
    </div>
</div>

<button id="backToTop" onclick="scrollToTop()">↑</button>

<script>
    const lessonConfig = {
        "n3": {
            "c7": { sentences: 5, grammar: 5, chokkai: 3 },
        }
    };

    function changeClass(step) {
        const input = document.getElementById('classInput');
        let newValue = parseInt(input.value) + step;
        if (newValue < 1) newValue = 1;
        input.value = newValue;
        loadContent();
        scrollToTop();
    }

    function hideParent(element) {
        const target = element.closest('.item-container, .answer-box, .sec-item');
        if (target) target.classList.add('hidden');
    }

    function handleAudioError(audioElement) {
        audioElement.classList.add('hidden');
    }

    function generateAudioHTML(baseUrl) {
        return `
            <audio controls preload="none" onerror="handleAudioError(this)">
                <source src="${baseUrl}.mp3" type="audio/mpeg">
                <source src="${baseUrl}.ogg" type="audio/ogg">
            </audio>
        `;
    }

    function loadContent() {
        const level = document.getElementById('levelInput').value;
        const classNum = document.getElementById('classInput').value;
        const prefix = `n${level}c${classNum}`;
        const imgPath = "https://nihongomax.com/data/images/";
        const audioPath = "https://nihongomax.com/data/audio/";
        
        document.getElementById('pageTitle').innerText = `JLPT N${level} - Class ${classNum}`;

        const counts = (lessonConfig[`n${level}`] && lessonConfig[`n${level}`][`c${classNum}`]) 
                       ? lessonConfig[`n${level}`][`c${classNum}`] 
                       : { sentences: 10, grammar: 10, chokkai: 5 };

        const sections = ['sentence-list', 'grammar-list', 'dokkai-list', 'chokkai-list', 'vocabulary-list'];
        sections.forEach(id => document.getElementById(id).innerHTML = '');

        // 1. Sentences
        for (let i = 1; i <= counts.sentences; i++) {
            const div = document.createElement('div');
            div.className = 'item-container';
            div.innerHTML = `<img src="${imgPath}${prefix}im${i}.jpg" onerror="hideParent(this)">${generateAudioHTML(`${audioPath}${prefix}a${i}`)}`;
            document.getElementById('sentence-list').appendChild(div);
        }

        // 2. Grammar
        for (let i = 1; i <= counts.grammar; i++) {
            const container = document.createElement('div');
            container.className = 'item-container';
            container.innerHTML = `
                <img src="${imgPath}${prefix}bun${i}.jpg" onerror="hideParent(this)">
                ${generateAudioHTML(`${audioPath}${prefix}bun${i}`)}
                <div class="sec-item">
                    <img src="${imgPath}${prefix}bun${i}sec.jpg" onerror="hideParent(this)">
                    ${generateAudioHTML(`${audioPath}${prefix}bun${i}sec`)}
                </div>`;
            document.getElementById('grammar-list').appendChild(container);
        }

        // 3. Dokkai
        document.getElementById('dokkai-list').innerHTML = `
            <div class="item-container"><img src="${imgPath}${prefix}dokkai.jpg" onerror="hideParent(this)"></div>
            <div class="answer-box">
                <h3>Answer & Explanation</h3>
                <img src="${imgPath}${prefix}getans.jpg" onerror="hideParent(this)">
                ${generateAudioHTML(`${audioPath}${prefix}dokkai`)}
            </div>`;

        // 4. Chokkai
        for (let i = 1; i <= counts.chokkai; i++) {
            const div = document.createElement('div');
            div.className = 'item-container';
            div.innerHTML = `
                <div class="chokkai-header">Chokkai ${i}</div>
                <img src="${imgPath}${prefix}chokai${i}.jpg" onerror="this.style.display='none'">
                <p><strong>Question Audio:</strong></p>
                ${generateAudioHTML(`${audioPath}${prefix}chokai${i}`)}
                <div class="answer-box">
                    <strong>Answer Audio:</strong><br>
                    ${generateAudioHTML(`${audioPath}${prefix}chokai${i}ans`)}
                </div>`;
            document.getElementById('chokkai-list').appendChild(div);
        }

        // 5. Vocabulary
        const vocabList = document.getElementById('vocabulary-list');
        const mainVocabDiv = document.createElement('div');
        mainVocabDiv.className = 'item-container';
        mainVocabDiv.innerHTML = `<img src="${imgPath}${prefix}vocab.jpg" onerror="hideParent(this)">`;
        vocabList.appendChild(mainVocabDiv);

        if (level === "1") {
            const tableDiv = document.createElement('div');
            tableDiv.className = 'item-container';
            tableDiv.innerHTML = `<img src="${imgPath}${prefix}itable.jpg" onerror="hideParent(this)">`;
            vocabList.appendChild(tableDiv);
        }
    }

    window.onscroll = function() {
        const btn = document.getElementById("backToTop");
        if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
            btn.style.display = "block";
        } else {
            btn.style.display = "none";
        }
    };

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.onload = loadContent;
</script>

</body>
</html>
